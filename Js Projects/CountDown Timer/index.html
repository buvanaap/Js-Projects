<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CountDown Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="container">

        <div id="title">
            <h3>Countdown to</h3>
            <h1>New Year</h1>
        </div>
        <div class="Timer">
            <div id="days">
                <p id="days-value">00</p>
                <p>Days</p>
            </div>
            <div id="hours">
                <p id="hours-value">00</p>
                <p>Hours</p>
            </div>
            <div id="mins">
                <p id="mins-value" >00</p>
                <p>Minutes</p>
            </div>
            <div id="secs">
                <p  id="secs-value">00</p>
                <p>Seconds</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
