<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>

<body>
    <div class="container">
        <h2>2025 Mood Calendar</h2>
        <p>~color each day depending on what your mood was / is~</p>
        <p>Select Mood:</p>
        <div class="mood-container">
            <button class="mood_1" id="mood1">
                <i class="far fa-laugh"></i>
            </button>
            <button class="mood_2" id="mood2">
                <i class="far fa-smile"></i>
            </button>
            <button class="mood_3" id="mood3">
                <i class="far fa-meh"></i>
            </button>
            <button class="mood_4" id="mood4">
                <i class="far fa-frown"></i>
            </button>
            <button class="mood_5" id="mood5">
                <i class="far fa-sad-tear"></i>
            </button>
            <p>then click on the circles below</p>
        </div>
        <button id="random">
            <i class="fas fa-random"></i>
        </button>
        <button id="clear">
            <i class="fas fa-sync"></i>
        </button>
    </div>
       <div id="calendar" ></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
