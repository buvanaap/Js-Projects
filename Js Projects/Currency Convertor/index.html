<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Convertor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Convert Currency</h1>
        <div class="box">
            <div class="left-box">

                <select name="currency-convertor" id="input">
                    
                </select>
                <input type="number">
            </div>
            <div class="right-box">

                <select name="currency-convertor" id="result" placeholder="AUD">

                </select>
                <input type="number">
            </div>
        </div>
        <div class="btn">
            <button class="convert">
                Convert
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
